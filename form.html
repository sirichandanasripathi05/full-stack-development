<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Registration Form</title>
    </head>
    <body>
        <h2>Student Registration Form</h2>
        <form>
            <label>Fullname:</label>
            <input type="text" placeholder="enter the Fullname">
            <br>
            <br>
            <label>Email:</label>
            <input type="email" placeholder="enter email">
            <br><br>
            <label>password:</label>
            <input type="password" placeholder="enter the password">
            <br>
            <br>
            <label>Date of Birth:</label>
            <input type="date">
            <br><br>
            <label>Phone Number:</label>
            <input type="number" placeholder="enter the phone number">
            <br></br>
            <label>Gender:</label>
            <input type="radio" name="gender">Female
            <input type="radio" name="gender">Male
            <br><br>
            <label>Hobbies:</label>
            <input type="checkbox" name="hobbies">Reading
            <input type="checkbox" name="hobbies">Travelling
            <input type="checkbox" name="hobbies">Music
            <br><br>
            <label>Course:</label>
            <select>
                <option value="B.Tech">B.Tech</option>
                <option value="M.Tech">M.Tech</option>
                <option value="MBA">MBA</option>
            </select>
            <br><br>
            <label>Address:</label>
            <br>
            <textarea rows="4" cols="30"></textarea>
            <br><br>
            <input type="submit" value="submit">
            <input type="reset" value="reset">        
        </form>
    </body>
</html>
